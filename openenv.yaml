name: clinical_triage_env
version: "3.0.0"
description: >
  True RL environment for clinical triage with tool use and GRPO training.
  Agents order diagnostic tests and receive real results before submitting
  triage decisions. Procedurally generates thousands of unique patients.
  Connects to TRL GRPOTrainer via rollout_func for actual weight updates.
author: your-hf-username
tags:
  - openenv
  - healthcare
  - triage
  - tool-use
  - grpo
  - real-rl

tasks:
  - name: vital_signs_triage
    difficulty: easy
    description: Classify urgency from vitals. 1 test allowed.
  - name: differential_diagnosis
    difficulty: medium
    description: Identify condition + triage. 2 tests. Relevant tests earn bonus.
  - name: polytrauma_cascade
    difficulty: hard
    description: Multi-system emergency. 3 tests. Cascading findings.

action_space:
  union:
    - type: OrderTestAction
      fields: {action_type: "order_test", test_name: str, reasoning: str}
    - type: SubmitTriageAction
      fields: {action_type: "submit_triage", triage_level: str, suspected_condition: str, reasoning: str}

observation_space:
  type: PatientObservation
  key_fields:
    test_results: "Dict[str,str] — grows as agent orders tests"
    tests_remaining: int
    available_actions: List[str]
    reward: "float strictly in (0.01, 0.99)"

reward:
  range: "(0.01, 0.99) strictly open"
  shaped: true
  dense: true
  components:
    - "Relevant test ordered: +0.15 on base 0.5"
    - "Irrelevant test: -0.05 on base 0.5"
    - "Correct triage level: +0.42 to +0.55"
    - "Condition category match: +0.18"
    - "Tool use bonus: +0.05 to +0.15"
    - "Early answer: +0.08"
    - "Under-triage penalty: -0.28 to -0.38"
    - "Reasoning quality: +0.04 to +0.08"

training:
  compatible: [TRL GRPOTrainer, SkyRL, ART, Oumi]
  rollout_func: train_grpo.rollout_func
  reward_func: train_grpo.clinical_reward_func
  train_script: train_grpo.py

endpoints:
  reset: "POST /reset  — body: {task_name?, seed?}"
  step: "POST /step   — body: {action: OrderTestAction|SubmitTriageAction}"
  state: "GET /state"
  health: "GET /health"
  tasks: "GET /tasks"
